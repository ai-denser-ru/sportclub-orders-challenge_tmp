server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Proxy is usually handled by docker-compose / explicit fetch URL or similar,
    # but in our frontend/vite config we proxy /api to localhost:8000.
    # In production, we'd either use Nginx to reverse proxy or let the frontend talk
    # directly if CORS allows. We'll set up a reverse proxy here so /api goes to backend.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
